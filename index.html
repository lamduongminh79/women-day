<!DOCTYPE html>

<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Women's Day</title>

<style>

body{
margin:0;
padding:0;
font-family:Arial,Helvetica,sans-serif;
background:linear-gradient(135deg,#ff7eb3,#ff758c,#ff9a9e);
overflow:hidden;
text-align:center;
}

.container{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
color:white;
width:90%;
max-width:500px;
}

h1{
font-size:45px;
}

button{
padding:14px 30px;
font-size:18px;
border:none;
border-radius:30px;
background:white;
color:#e63946;
cursor:pointer;
margin-top:20px;
}

#finalImage{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(1);
transition:0.6s;
z-index:5;
}


#finalImage img{
width:220px;
height:220px;
object-fit:cover;
border-radius:50%;
border:6px solid white;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

/* book */

.book{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(0);
width:90%;
max-width:500px;
height:360px;
background:#c1121f;
border-radius:8px;
box-shadow:0 20px 60px rgba(0,0,0,0.4);
transition:0.6s;
overflow:hidden;
}

.book.open{
transform:translate(-50%,-50%) scale(1);
}

.page{
position:absolute;
width:100%;
height:100%;
background:#fff0f5;
padding:30px;
box-sizing:border-box;
display:none;
}

.page.active{
display:block;
}

.page h2{
color:#c1121f;
}

/* image */

.photo{
width:140px;
height:140px;
object-fit:cover;
border-radius:50%;
margin-top:10px;
border:4px solid white;
box-shadow:0 6px 18px rgba(0,0,0,0.3);
}

/* next button */

.next{
position:absolute;
bottom:20px;
right:20px;
padding:8px 16px;
background:#c1121f;
color:white;
border:none;
border-radius:20px;
cursor:pointer;
}

.rose{
font-size:70px;
margin-top:20px;
}

.typing{
font-size:18px;
line-height:1.6;
text-align:left;
}

.heart{
position:absolute;
width:20px;
height:20px;
background:red;
transform:rotate(45deg);
animation:float 6s linear infinite;
}

.heart:before,
.heart:after{
content:"";
width:20px;
height:20px;
background:red;
border-radius:50%;
position:absolute;
}

.heart:before{top:-10px;}
.heart:after{left:-10px;}

@keyframes float{

0%{
transform:translateY(0) rotate(45deg);
opacity:1;
}

100%{
transform:translateY(-900px) rotate(45deg);
opacity:0;
}

}

@media (max-width:600px){

.container{
top:60%;
}

h1{
font-size:28px;
}

button{
font-size:16px;
padding:12px 24px;
}

.book{
width:92%;
height:400px;
}

.typing{
font-size:16px;
line-height:1.5;
}

.photo{
width:120px;
height:120px;
}

}

</style>

</head>

<body>

<div class="container">

<h1>🌸 Happy Women's Day 🌸</h1>

<p>Chúc bạn một ngày 8/3 thật vui vẻ</p>

<button onclick="openBook()">Nhấn vào đây 💌</button>

</div>

<div class="book" id="book">

<div class="page active" id="p1">

<h2>Trang 1</h2>

<div class="rose">🌹</div>

<button class="next" onclick="nextPage(2)">Trang tiếp ➜</button>

</div>

<div class="page" id="p2">

<h2>Trang 2</h2>

<div class="typing" id="text1"></div>

<button class="next" onclick="nextPage(3)">Trang tiếp ➜</button>

</div>

<div class="page" id="p3">

<h2>Trang 3</h2>

<div class="typing" id="text2"></div>

<button class="next" onclick="nextPage(4)">Trang tiếp ➜</button>

</div>

<div class="page" id="p4">

<h2>💖 Happy Women's Day 💖</h2>

<p>Chúc bạn luôn hạnh phúc và xinh đẹp</p>

<div id="finalImage">
<img src="image.jpg">
</div>

<button class="next" onclick="closeBook()">Đóng sổ</button>

</div>

</div>

<script>

function openBook(){
document.getElementById("book").classList.add("open")
}

function closeBook(){
document.getElementById("book").classList.remove("open")
}

function nextPage(page){

document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"))

document.getElementById("p"+page).classList.add("active")

if(page===2){
typeText("text1",
"Nhân ngày 8/3, chúc bạn luôn vui vẻ, xinh đẹp và gặp nhiều may mắn trong cuộc sống.");
}

if(page===3){
typeText("text2",
"Hy vọng rằng mỗi ngày của bạn đều tràn đầy niềm vui, nụ cười và những điều tuyệt vời.");
}

}

function typeText(id,text){

let i=0
let speed=40
let element=document.getElementById(id)

element.innerHTML=""

function typing(){

if(i<text.length){

element.innerHTML+=text.charAt(i)

i++

setTimeout(typing,speed)

}

}

typing()

}

setInterval(function(){

let heart=document.createElement("div")

heart.className="heart"

heart.style.left=Math.random()*100+"vw"

heart.style.bottom="-20px"

heart.style.animationDuration=(Math.random()*3+3)+"s"

document.body.appendChild(heart)

setTimeout(()=>heart.remove(),6000)

},300)

</script>

</body>
</html>
