<!DOCTYPE html>
<html lang="vi">

<head>
<meta charset="UTF-8">
<title>Happy Women's Day 8/3</title>

<style>

body{
    margin:0;
    padding:0;
    overflow:hidden;
    font-family:Arial, Helvetica, sans-serif;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4,#fad0c4);
    text-align:center;
}

.container{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    color:white;
}

h1{
    font-size:55px;
    margin-bottom:10px;
}

p{
    font-size:22px;
}

button{
    margin-top:20px;
    padding:15px 35px;
    font-size:18px;
    border:none;
    border-radius:40px;
    background:white;
    color:#ff4b7d;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.1);
}

#message{
    margin-top:30px;
    font-size:28px;
}

/* HEART */

.heart{
    position:absolute;
    width:20px;
    height:20px;
    background:red;
    transform:rotate(45deg);
    animation:float 6s linear infinite;
}

.heart::before,
.heart::after{
    content:"";
    width:20px;
    height:20px;
    background:red;
    border-radius:50%;
    position:absolute;
}

.heart::before{
    top:-10px;
}

.heart::after{
    left:-10px;
}

@keyframes float{

0%{
    transform:translateY(0) rotate(45deg);
    opacity:1;
}

100%{
    transform:translateY(-900px) rotate(45deg);
    opacity:0;
}

}

</style>

</head>

<body>

<div class="container">

<h1>🌸 Happy Women's Day 🌸</h1>

<p>Chúc bạn một ngày 8/3 thật vui vẻ</p>

<button onclick="showMessage()">Nhấn vào đây 💌</button>

<div id="message"></div>

</div>


<script>

function showMessage(){

document.getElementById("message").innerHTML =
"💖 Chúc bạn luôn xinh đẹp, hạnh phúc và gặp nhiều may mắn trong cuộc sống 💖";

}


/* HEART ANIMATION */

setInterval(function(){

let heart = document.createElement("div");
heart.className = "heart";

heart.style.left = Math.random()*100 + "vw";
heart.style.bottom = "-50px";

heart.style.animationDuration = (Math.random()*3+3) + "s";

document.body.appendChild(heart);

setTimeout(function(){
heart.remove();
},6000);

},300);


</script>

</body>
</html>
