<!DOCTYPE html>

<html lang="vi">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Women's Day</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,Helvetica,sans-serif;
background:linear-gradient(135deg,#ff7eb3,#ff758c,#ff9a9e);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
color:white;
overflow:hidden;
}

/* trang đầu */

.container{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
color:#e63946;
width:90%;
max-width:420px;
z-index:10;
}

h1{
font-size:32px;
margin-bottom:10px;
}

p{
font-size:16px;
}

button{
padding:14px 30px;
font-size:18px;
border:none;
border-radius:30px;
background:#e63946;
color:white;
cursor:pointer;
margin-top:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

/* cuốn sổ */

.book{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(0);
width:90%;
max-width:420px;
height:380px;
background:#c1121f;
border-radius:12px;
box-shadow:0 20px 60px rgba(0,0,0,0.4);
transition:0.5s;
overflow:hidden;
z-index:5;
}

.book.open{
transform:translate(-50%,-50%) scale(1);
}

/* trang */

.page{
position:absolute;
width:100%;
height:100%;
background:#fff0f5;
padding:25px;
display:none;
color:#c1121f;
z-index:6;
}

.page.active{
display:block;
}

.page h2{
margin-bottom:20px;
}

/* nút */

.next{
position:absolute;
bottom:20px;
right:20px;
padding:8px 16px;
background:#e63946;
color:white;
border:none;
border-radius:20px;
cursor:pointer;
}

/* hoa */

.rose{
font-size:60px;
margin-top:20px;
}

/* chữ */

.typing{
font-size:16px;
line-height:1.6;
text-align:left;
}

/* tim bay */

.heart{
position:absolute;
width:18px;
height:18px;
background:red;
transform:rotate(45deg);
animation:float 6s linear infinite;
z-index:1;
pointer-events:none;
}

.heart:before,
.heart:after{
content:"";
width:18px;
height:18px;
background:red;
border-radius:50%;
position:absolute;
}

.heart:before{top:-9px;}
.heart:after{left:-9px;}

@keyframes float{

0%{
transform:translateY(0) rotate(45deg);
opacity:1;
}

100%{
transform:translateY(-900px) rotate(45deg);
opacity:0;
}

}

/* ảnh cuối */

#finalImage{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(0);
transition:0.6s;
z-index:20;
}

#finalImage.show{
transform:translate(-50%,-50%) scale(1);
}

#finalImage img{
width:220px;
height:220px;
object-fit:cover;
border-radius:50%;
border:6px solid white;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

/* mobile */

@media (max-width:600px){

h1{
font-size:26px;
}

.book{
height:400px;
}

.typing{
font-size:15px;
}

}

</style>

</head>

<body>

<div class="container">

<h1>🌸 Happy Women's Day 🌸</h1>

<p>Hôm nay mình chơi lễ muộn đi hehee</p>

<button onclick="openBook()">Nhấn vào đây 💌</button>

</div>

<div class="book" id="book">

<div class="page active" id="p1">

<h2>Trang 1</h2>

<div class="rose">🌹</div>

<div class="typing" id="text0"></div>

<button class="next" onclick="nextPage(2)">Trang tiếp ➜</button>

</div>

<div class="page" id="p2">

<h2>Trang 2</h2>

<div class="typing" id="text1"></div>

<button class="next" onclick="nextPage(3)">Trang tiếp ➜</button>

</div>

<div class="page" id="p3">

<h2>Trang 3</h2>

<div class="typing" id="text2"></div>

<button class="next" onclick="nextPage(4)">Trang tiếp ➜</button>

</div>

<div class="page" id="p4">

<h2>💖 Happy Women's Day 💖</h2>

<p>Chúc bạn luôn hạnh phúc và xinh đẹp</p>

<button class="next" onclick="closeBook()">Đóng sổ</button>

</div>

</div>

<div id="finalImage">

<img src="image.jpg">

</div>

<script>

function openBook(){

document.querySelector(".container").style.display="none";

document.getElementById("book").classList.add("open")

typeText("text0",
"Lời nói đầu tiên thì hong biết nói gì hết thôi thì tặng cho vợ cành bông nè hẹ hẹ. Không anh chứ ai đố em tìm được ai giống anh thứ 2");

}

function closeBook(){

document.getElementById("book").classList.remove("open")

document.getElementById("finalImage").classList.add("show")

}

function nextPage(page){

document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"))

document.getElementById("p"+page).classList.add("active")

if(page===2){

typeText("text1",
"Nhân ngày 8/3, anh không phải là con người ngọt ngào trong lời nói em cũng biết nên là ngay lúc này anh không biết mình phải nói gì, thôi thì anh sẽ chúc em ngày càng đẹp hơn như những bông hoa hồng nở rộ khi gặp đúng mùa.");

}

if(page===3){

typeText("text2",
"Như anh đã từng nói anh không cầu kì và phô trương, tình yêu của anh được định nghĩa bằng hành động. Anh đã dành thời gian tìm và lựa thật kĩ món quà cho em. Có thể hơi trễ một chút nhưng cô gái của anh sẽ không bao giờ thiệt thòi đâu.");

}

}

function typeText(id,text){

let i=0

let speed=40

let element=document.getElementById(id)

element.innerHTML=""

function typing(){

if(i<text.length){

element.innerHTML+=text.charAt(i)

i++

setTimeout(typing,speed)

}

}

typing()

}

/* tim bay */

setInterval(function(){

let heart=document.createElement("div")

heart.className="heart"

heart.style.left=Math.random()*100+"vw"

heart.style.bottom="-20px"

heart.style.animationDuration=(Math.random()*3+3)+"s"

document.body.appendChild(heart)

setTimeout(()=>heart.remove(),6000)

},350)

</script>

</body>

</html>
